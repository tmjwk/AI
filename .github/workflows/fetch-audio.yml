name: Fetch YouTube Audio (fallback - no cookies)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp + ffmpeg
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install -q yt-dlp

      - name: Download audio (no cookies)
        run: |
          yt-dlp -f "bestaudio" --extract-audio --audio-format mp3 --audio-quality 5 \
            -o "audio.%(ext)s" "${{ github.event.inputs.video_url }}"
          ls -lh audio.*

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio
          path: audio.*
          retention-days: 1
