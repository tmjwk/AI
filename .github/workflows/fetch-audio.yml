name: Fetch YouTube Audio

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install yt-dlp + ffmpeg + deno
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install -q yt-dlp
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
      
      - name: Download audio with cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > cookies.txt
            yt-dlp --cookies cookies.txt               -f "bestaudio" --extract-audio --audio-format mp3 --audio-quality 5               -o "audio.%(ext)s" "${{ github.event.inputs.video_url }}"
            rm cookies.txt
          else
            yt-dlp               -f "bestaudio" --extract-audio --audio-format mp3 --audio-quality 5               -o "audio.%(ext)s" "${{ github.event.inputs.video_url }}"
          fi
          ls -lh audio.*
      
      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio
          path: audio.*
          retention-days: 1
