@media print{
  /* Force light theme regardless of user setting */
  :root,[data-theme="dark"]{--bg:#fff;--fg:#000;--card:#fff;--bd:#888;--bdl:#bbb;--hp:#000;--hs:#000;--hm:#222;--hd:#666;--ac:#000;--rk:#000;--ba:#000;--rd:#000;--bl:#000}
  html{font-size:10pt}
  body{background:#fff !important;color:#000 !important;font-family:Georgia,"Times New Roman",serif;line-height:1.4;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* Page margins — paper-saving (A4 / Letter) */
  @page{margin:1cm 1.2cm}
  /* Full width — small horizontal padding so content does not touch page edge */
  .c{max-width:none !important;margin:0 !important;padding:0 !important}

  .h,.tgl,.btt,footer,.skeleton-loader,.art-toggle,.art-lang,.art-card-toggle,.nav,.nav-links,.banner,.search-box,.filter-bar,.chips,.card-lang,.print-only-header{display:none !important}
  /* Headings — tight, page-break-after:avoid keeps title with body */
  h1{font-size:18pt;color:#000 !important;border-bottom:1.5px solid #000;padding-bottom:2pt;margin:0 0 8pt 0;page-break-after:avoid}
  h2,h3,h4{color:#000 !important;page-break-after:avoid}

  a{color:#000 !important;text-decoration:underline}
  a[href^="#"]:after,a[href^="ai-"]:after,a[href^="index"]:after{content:""}
  /* ===== Weekly articles (index.html) ===== */
  /* Compact padding, allow breaking across pages, no double-frame with .article-card */
  .article{background:#fff !important;border:0 !important;border-left:2px solid #000 !important;border-radius:0 !important;padding:6pt 10pt !important;margin:0 0 8pt 0 !important;page-break-inside:auto;page-break-after:auto}
  .article.collapsed .art-body{display:block !important}
  .art-header{cursor:default;page-break-after:avoid;padding:0 !important;margin:0 !important}
  .art-num{background:#fff !important;border:1px solid #888 !important;color:#000 !important;font-size:8pt;padding:1pt 4pt !important;margin-bottom:3pt !important}
  .art-title{font-size:13pt !important;color:#000 !important;margin:0 0 4pt 0 !important;line-height:1.25 !important}

  .art-meta{color:#666 !important;font-size:8.5pt !important;margin:0 0 4pt 0 !important;gap:8px !important}
  .art-toc{background:#fff !important;border:1px solid #aaa !important;font-size:8pt;page-break-inside:auto;padding:4pt 8pt !important;margin-bottom:6pt !important}
  .art-toc-title{color:#000 !important;margin-bottom:2pt !important;font-size:7.5pt !important}
  .art-toc-list a{color:#000 !important}
  /* Sections — allow breaking, tight margins */
  .art-section{page-break-inside:auto;margin-bottom:8pt !important;scroll-margin-top:0}
  .art-section h3{color:#000 !important;border-bottom:1px solid #888 !important;font-size:11pt;page-break-after:avoid;margin:0 0 4pt 0 !important;padding-bottom:2pt !important}
  .art-section p{color:#000 !important;font-size:10pt;orphans:2;widows:2;margin:0 0 6pt 0 !important;line-height:1.4 !important}
  /* Quotes — allow breaking if long, compact padding */
  .quote{background:#fff !important;border-left:2px solid #555 !important;color:#222 !important;font-style:italic;page-break-inside:auto;padding:4pt 8pt !important;margin:4pt 0 !important;font-size:9.5pt !important}
  .quote .q-author{color:#000 !important;font-size:8pt !important;margin-bottom:2pt !important}
  .art-sources{color:#666 !important;border-top:1px solid #888 !important;font-size:8pt;page-break-inside:auto;margin-top:6pt !important;padding-top:3pt !important}

  /* ===== Tables (LM Arena, layoffs, benchmarks) — compact ===== */
  table{width:100%;border-collapse:collapse;font-size:8.5pt;page-break-inside:auto}

  th{background:#eee !important;color:#000 !important;font-weight:600}
  /* ===== Radar episodes ===== */
  .episode{margin-bottom:8pt !important;page-break-inside:auto}

  /* ===== Pulse episodes ===== */
  .blk-lbl{font-weight:600;color:#000 !important;font-size:9pt !important}
  /* ===== Misc ===== */

  .update-list li{color:#000 !important;border-bottom:1px solid #aaa !important;font-size:9pt !important;padding:3pt 0 !important}
  .update-date{color:#000 !important}
  /* Print-only block — visible only on paper */
  .print-only{display:block !important}
}
