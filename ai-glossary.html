*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;background:var(--bg);color:var(--fg);margin:0;padding:0;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}

.nav-btn{background:var(--card);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:var(--fs-s);color:var(--hs);text-decoration:none;font-weight:500;transition:all .15s;white-space:nowrap}
.nav-btn:hover{border-color:var(--ac);color:var(--fg)}

.h a:hover{border-color:var(--ac);color:var(--ac)}
.tgl{background:var(--card);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:var(--fs-m);color:var(--fg);transition:border-color .15s}

.chip:hover{border-color:var(--ac);color:var(--fg)}
.chip.active{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.chip.chip-new{border-color:var(--ba);color:var(--ba);background:rgba(251,191,36,.08)}
.chip.chip-new.active{background:var(--ba);color:var(--bg);border-color:var(--ba)}
.chip.chip-new::after{content:' 🆕'}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;font-size:var(--fs-s);color:var(--hm)}
.st{display:flex;align-items:center;gap:4px}

.term .tn{font-size:var(--fs-l);font-weight:700;color:var(--hp);font-family:"SF Mono",Menlo,monospace}

.nr{color:var(--hm);font-size:15.5px;text-align:center;padding:40px 20px;font-style:italic}
.f{margin-top:36px;padding-top:18px;border-top:1px solid var(--bdl);font-size:var(--fs-s);color:var(--hd);text-align:center}

<script>
let S={q:'',chips:[],theme:'dark',lang:'pl'};
function nm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function L(obj,field_pl,field_en){/* bilingual helper — zwraca PL lub EN wg S.lang, fallback PL gdy EN pusty */
  if(S.lang==='en'&&obj[field_en]&&obj[field_en].trim())return obj[field_en];
  return obj[field_pl];
}
function init(){
S.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
S.lang="pl";
document.documentElement.setAttribute('data-theme',S.theme);
document.documentElement.setAttribute('data-lang',S.lang);
document.getElementById('themeTgl').textContent=S.theme==='dark'?'🌙':'☀️';
const langBtn=document.getElementById('langTgl');if(langBtn){langBtn.textContent=S.lang==='pl'?'EN':'PL';langBtn.addEventListener('click',toggleLang)}
renderChips();render();attachTermLangToggles();
// Cross-site search: czytaj ?q= z URL
const urlQ=new URLSearchParams(location.search).get('q');
if(urlQ){S.q=urlQ;document.getElementById('search').value=urlQ;render();attachTermLangToggles()}
document.getElementById('search').addEventListener('input',e=>{S.q=e.target.value;render();attachTermLangToggles()});
document.getElementById('themeTgl').addEventListener('click',toggleTheme);
}
function renderChips(){const c=document.getElementById('chips');let h='<span class="chip active" data-filter="all"><span class="pl">Wszystkie</span><span class="en">All</span></span>';CATS.forEach(cat=>{const n=G.filter(e=>e.c===cat).length;const isNewCat=n>0&&n<=2;const newClass=isNewCat?' chip-new':'';const icon=ICONS[cat]||'📋';h+=`<span class="chip${newClass}" data-filter="${cat}">${icon} ${cat} (${n})</span>`});c.innerHTML=h;c.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{const f=ch.getAttribute('data-filter');if(f==='all'){S.chips=[];c.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));ch.classList.add('active')}else{c.querySelector('[data-filter="all"]').classList.remove('active');const i=S.chips.indexOf(f);if(i>-1){S.chips.splice(i,1);ch.classList.remove('active')}else{S.chips.push(f);ch.classList.add('active')}if(S.chips.length===0){c.querySelector('[data-filter="all"]').classList.add('active')}}render()}))}
function renderTerm(e){const lang=e._lang||S.lang;const langHint=lang==='pl'?'pl':'en';return `<div class="term ${lang==='en'?'en':''}" data-term="${e.t}"><div class="th"><span class="tn">${e.t}</span>${e.en&&e.en!==e.t?`<span class="ten">${e.en}</span>`:''}<span class="tc">${e.c}</span><span class="term-lang" data-lang="${langHint}" onclick="var t=this.closest('.term');t.classList.toggle('en');this.setAttribute('data-lang',t.classList.contains('en')?'en':'pl')"></span></div><div class="td"><span class="pl">${e.d_pl}</span><span class="en">${e.d_en||e.d_pl}</span></div></div>`}
function attachTermLangToggles(){}
function render(){try{const content=document.getElementById('content');let vis=0;let filtered=G.filter(e=>{const txt=nm(e.t+' '+e.en+' '+(e.d_pl||'')+' '+(e.d_en||'')+' '+e.c);let ok=true;if(S.chips.length>0){ok=S.chips.includes(e.c)}if(ok&&S.q){ok=txt.includes(nm(S.q))}return ok});if(filtered.length===0){content.innerHTML='<div class="nr">Brak wyników dla "'+S.q+'"</div>';return}let h='';if(S.q){filtered.sort((a,b)=>{const q=nm(S.q);const an=nm(a.t+' '+(a.en||''));const bn=nm(b.t+' '+(b.en||''));const aInName=an.includes(q);const bInName=bn.includes(q);if(aInName&&!bInName)return-1;if(!aInName&&bInName)return 1;return a.t.localeCompare(b.t)});h+=`<div class="sec"><div class="sec-t"><span class="icon">🔍</span> ${filtered.length} ${filtered.length===1?'wynik':'wyników'} dla "${S.q}"</div>`;filtered.forEach(e=>{h+=renderTerm(e)});h+='</div>'}else{CATS.forEach(cat=>{const items=filtered.filter(e=>e.c===cat);if(items.length===0)return;vis+=items.length;h+=`<div class="sec" data-cat="${cat}"><div class="sec-t"><span class="icon">${ICONS[cat]}</span> ${cat} <span class="cnt">${items.length} ${items.length===1?'hasło':(items.length<5?'hasła':'haseł')}</span></div>`;items.forEach(e=>{h+=renderTerm(e)});h+='</div>'})}content.innerHTML=h}catch(e){console.error("Render error:",e);document.getElementById("content").innerHTML='<div class="nr">⚠ Błąd renderowania — odśwież stronę. Szczegóły w konsoli (F12).</div>'}}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('themeTgl').textContent=S.theme==='dark'?'🌙':'☀️';localStorage.setItem('theme',S.theme)}
function toggleLang(){S.lang=S.lang==='pl'?'en':'pl';document.documentElement.setAttribute('data-lang',S.lang);const b=document.getElementById('langTgl');if(b)b.textContent=S.lang==='pl'?'EN':'PL';localStorage.setItem('lang',S.lang);render();attachTermLangToggles()}
init();
