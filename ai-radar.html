function L(obj,field_pl,field_en){if(lang==='en'&&obj[field_en]&&obj[field_en].trim())return obj[field_en];return obj[field_pl]}

function renderTag(tag){
  return `<span class="tag tag-${tag.color}">${esc(tag.text)}</span>`;
}

function renderCard(card){
  const tagsHtml = (card.tags||[]).map(renderTag).join('');
  const codeHtml = card.code ? `<div class="code">${card.code}</div>` : '';
  const listHtml = card.list && card.list.length > 0
    ? `<ul class="list" style="margin-top:8px">${card.list.map(it=>`<li><span class="dot dot-${it.dot_color}"></span> <span class="pl">${it.html_pl||''}</span><span class="en">${it.html_en||it.html_pl||''}</span></li>`).join('')}</ul>`
    : '';
  const styleAttr = card.full_width ? ' style="margin-top:10px"' : '';
  const descHtml = (card.desc_pl || card.desc_en) ? `<p><span class="pl">${card.desc_pl||''}</span><span class="en">${card.desc_en||card.desc_pl||''}</span></p>` : '';
  // Badge NOWE tylko dla kart z aktualnego tygodnia (7 dni)
  const isNew = card.date && (Date.now() - new Date(card.date).getTime()) < 7 * 24 * 60 * 60 * 1000;
  const newBadge = isNew ? ` <span style="background:var(--ac);color:#000;padding:1px 6px;border-radius:3px;font-size:var(--fs-xs);font-weight:700;margin-left:6px">NOWE</span>` : '';
  const dateBadge = card.date ? ` <span style="color:var(--hd);font-size:var(--fs-xs);font-family:monospace;margin-left:6px">${card.date}</span>` : '';
  const langHint = lang==='pl'?'pl':'en';
  const cardLangClass = lang==='en' ? ' en' : '';
  return `<div class="card${cardLangClass}"${styleAttr}>
<h3>${card.title}${newBadge}${dateBadge}<span class="card-lang" data-lang="${langHint}" onclick="var c=this.closest('.card');c.classList.toggle('en');this.setAttribute('data-lang',c.classList.contains('en')?'en':'pl')"></span></h3>
${descHtml}
${codeHtml}
${tagsHtml ? `<p style="margin:0">${tagsHtml}</p>` : ''}
${listHtml}
</div>`;
}

function renderSection(sec){
  // v8.7.1-14-gd0e458b: render section inside episode (no archive logic — episodes handle chronology)
  let body = '';
  if (sec.type === 'cards') {
    const sorted = (sec.cards||[]).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
    body = `<div class="grid">${sorted.map(renderCard).join('')}</div>`;
  } else if (sec.type === 'list') {
    body = `<ul class="list">${sec.items.map(it=>`<li><span class="dot dot-${it.dot_color}"></span> ${L(it,'html_pl','html_en')}</li>`).join('')}</ul>`;
  } else if (sec.type === 'table') {
    const headerRow = `<thead><tr>${sec.headers.map((h,i)=>`<th${i===0?' class="rank"':''}${i===sec.headers.length-1?' class="score"':''}>${esc(h)}</th>`).join('')}</tr></thead>`;
    const bodyRows = sec.rows.map(row => {
      const cells = row.map(c => {
        if (typeof c === 'object' && c.tag) {
          return `<td>${renderTag(c.tag)}</td>`;
        }
        const isNum = /^\d+$/.test(String(c).trim());
        return `<td${isNum?' class="score"':''}>${esc(String(c))}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    body = `<table class="table">${headerRow}<tbody>${bodyRows}</tbody></table>`;
    if (sec.note) body += `<p style="font-size:var(--fs-s);color:var(--hd);margin-top:8px">${sec.note}</p>`;
  }

  return `<div class="sec" id="${sec.id}">
<div class="sec-t"><span class="icon">${sec.icon}</span> ${esc(sec.title)}</div>
${body}
</div>`;
}

let R_chips=[];
function renderRadarChips(){const c=document.getElementById('radarChips');if(!c)return;let h='';c.innerHTML=h}

// v8.7.1-14-gd0e458b: Episode renderers (skopiowane z pulse AI, przerobione na sections+cards)
function renderEpisodeBody(ep){
  const sectionsHtml = ep.sections.map(renderSection).join('');
  return `<div class="ep-collapse">
${sectionsHtml}
</div>`;
}

function renderEpisodeHeader(ep){
  const epClass = ep.collapsed ? 'episode ep-old' : 'episode ep-old open';
  const toggleBtn = `<button class="ep-toggle-btn" data-ep-id="${esc(ep.id)}">${ep.collapsed ? '▼ Rozwiń' : '▲ Zwiń'}</button>`;
  const cardsCount = ep.sections.reduce((sum, s) => sum + (s.cards ? s.cards.length : 0), 0);
  const itemsCount = ep.sections.reduce((sum, s) => sum + (s.items ? s.items.length : 0), 0);
  return `<div class="${epClass}" data-ep-id="${esc(ep.id)}">
<div class="e-top">
<span class="e-num">📡</span>
<span class="e-channel">Lev Selector</span>
</div>
<div class="e-title">${esc(ep.title)}</div>
<div class="e-meta">
<span class="m-item">📅 <span class="mv">${esc(ep.date)}</span></span>
<span class="m-item">📊 <span class="mv">${cardsCount} kart</span></span>
${itemsCount > 0 ? `<span class="m-item">📋 <span class="mv">${itemsCount} pozycji</span></span>` : ''}
</div>
${toggleBtn}
</div>`;
}

function renderEpisodeFull(ep){
  return renderEpisodeHeader(ep) + renderEpisodeBody(ep);
}

function attachToggleHandlers(){
  document.querySelectorAll('.ep-toggle-btn').forEach(btn=>{
    btn.addEventListener('click', function(){
      var epDiv = this.closest('.ep-old');
      if(!epDiv) return;
      var isOpen = epDiv.classList.contains('open');
      if(isOpen){
        epDiv.classList.remove('open');
        this.textContent = '▼ Rozwiń';
      } else {
        epDiv.classList.add('open');
        this.textContent = '▲ Zwiń';
      }
    });
  });
}

function renderAll(){try{
  const container = document.getElementById('episodes');
  if (!container || typeof episodes === 'undefined') {
    console.error('Brak #episodes lub episodes');
    return;
  }
  // Renderuj odcinki (sortowane DESC)
  const sorted = [...episodes].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  let html = sorted.map(renderEpisodeFull).join('');
  // Renderuj sticky sections (CO JEST MOŻLIWE, LM ARENA) — po odcinkach
  if (typeof sticky !== 'undefined' && sticky.length > 0) {
    html += sticky.map(renderSection).join('');
  }
  container.innerHTML = html;
  attachToggleHandlers();
}catch(e){console.error("Render error:",e);var el=document.getElementById("episodes");if(el)el.innerHTML='<div class="nr">⚠ Błąd renderowania — odśwież stronę. Szczegóły w konsoli (F12).</div>'}}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function(){renderRadarChips();renderAll()});
} else {
  renderRadarChips();renderAll();
}
