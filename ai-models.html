/* v8.7.1-20-g4567b40: Typography scale — 6 rozmiarów (rem, mobile-responsive) */
:root{--bg:#0a0a0a;--fg:#e5e5e5;--card:#111;--bd:#2a2a2a;--bdl:#1a1a1a;--hp:#fafafa;--hs:#c4c4c4;--hm:#b5b5b5;--hd:#a8a8a8;--ac:#4ade80;--rk:#6b8cce;--ba:#fbbf24;--rd:#ef4444;--bl:#3b82f6;
/* v8.9.0: Typography — 4 role semantyczne */
--fs-h1:1.75rem;--fs-h2:1.125rem;--fs-body:1rem;--fs-aux:0.75rem;
/* Aliasy (backward compat) */
--fs-xl:var(--fs-h1);--fs-l:var(--fs-h2);--fs-m:var(--fs-body);--fs-s:var(--fs-aux);--fs-xs:0.625rem;--fs-xxl:5rem}

:root{--fs-s:0.6875rem;--fs-m:0.8125rem;--fs-l:0.9375rem;--fs-xl:1.125rem;--fs-xxl:3.75rem}
}

@media print{
  /* Force light theme regardless of user setting */
  :root,[data-theme="dark"]{--bg:#fff;--fg:#000;--card:#fff;--bd:#888;--bdl:#bbb;--hp:#000;--hs:#000;--hm:#222;--hd:#666;--ac:#000;--rk:#000;--ba:#000;--rd:#000;--bl:#000}
  html{font-size:10pt}
  body{background:#fff !important;color:#000 !important;font-family:Georgia,"Times New Roman",serif;line-height:1.4;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* Page margins — paper-saving (A4 / Letter) */
  @page{margin:1cm 1.2cm}
  /* Full width — small horizontal padding so content does not touch page edge */
  .c{max-width:none !important;margin:0 !important;padding:0 !important}
  /* Hide non-printable UI */
  .h,.tgl,.btt,footer,.skeleton-loader,.art-toggle,.art-lang,.art-card-toggle,.nav,.nav-links,.banner,.search-box,.filter-bar,.chips,.card-lang,.print-only-header{display:none !important}
  /* Headings — tight, page-break-after:avoid keeps title with body */
  h1{font-size:18pt;color:#000 !important;border-bottom:1.5px solid #000;padding-bottom:2pt;margin:0 0 8pt 0;page-break-after:avoid}
  h2,h3,h4{color:#000 !important;page-break-after:avoid}
  /* Links — underline only */
  a{color:#000 !important;text-decoration:underline}
  a[href^="#"]:after,a[href^="ai-"]:after,a[href^="index"]:after{content:""}
  /* ===== Weekly articles (index.html) ===== */
  /* Compact padding, allow breaking across pages, no double-frame with .article-card */
  .article{background:#fff !important;border:0 !important;border-left:2px solid #000 !important;border-radius:0 !important;padding:6pt 10pt !important;margin:0 0 8pt 0 !important;page-break-inside:auto;page-break-after:auto}

  .art-header{cursor:default;page-break-after:avoid;padding:0 !important;margin:0 !important}
  .art-num{background:#fff !important;border:1px solid #888 !important;color:#000 !important;font-size:8pt;padding:1pt 4pt !important;margin-bottom:3pt !important}

function openModel(id){const m=M.find(x=>slug(x.n)===id);if(!m)return;const clr=vc(m.v);const bl=isBan(m);const nw=isNew(m.d);let h=`<button class="close" onclick="closeModal('modelModal')">&times;</button><h2>${m.n}</h2>`;h+=`<div class="mrow"><span class="ml"><span class="pl">Vendor</span><span class="en">Vendor</span></span><span class="mv"><span class="vdot" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${clr};margin-right:6px"></span>${m.v}</span></div>`;h+=`<div class="mrow"><span class="ml"><span class="pl">Data wydania</span><span class="en">Release date</span></span><span class="mv">${m.d}</span></div>`;h+=`<div class="mrow"><span class="ml"><span class="pl">Kategoria</span><span class="en">Category</span></span><span class="mv">${m.c}</span></div>`;h+=`<div class="mrow"><span class="ml"><span class="pl">Rank</span><span class="en">Rank</span></span><span class="mv">#${m.r} <span class="pl">w kategorii</span><span class="en">in category</span></span></div>`;h+=`<div class="mrow"><span class="ml"><span class="pl">Open-source</span><span class="en">Open-source</span></span><span class="mv">${m.o?'<span class="pl">✅ Tak (open-weights/open-source)</span><span class="en">✅ Yes (open-weights/open-source)</span>':'<span class="pl">❌ Nie (proprietary)</span><span class="en">❌ No (proprietary)</span>'}</span></div>`;h+=`<div class="mrow"><span class="ml"><span class="pl">Opis</span><span class="en">Description</span></span><span class="mv">${L(m,'desc_pl','desc_en')}</span></div>`;h+=`<div class="mrow"><span class="ml"><span class="pl">★ Najlepszy w</span><span class="en">★ Best at</span></span><span class="mv">${L(m,'b_pl','b_en')}</span></div>`;if(m.status==='ban-lifted'){h+=`<div class="mrow"><span class="ml"><span class="pl">Status</span><span class="en">Status</span></span><span class="mv"><span class="pl">⚠️ Ban zdjęty (27.06.2026) — wraca po 2 tygodniach zawieszenia</span><span class="en">⚠️ Ban lifted (27.06.2026) — returns function toggleCompare(id){const i=S.cmp.indexOf(id);if(i>-1){S.cmp.splice(i,1)}else{if(S.cmp.length>=4){showToast('Max 4 modele do porównania');return}S.cmp.push(id)}render();updateCmpBtn()}

function openCompare(){if(S.cmp.length<2)return;const models=S.cmp.map(id=>M.find(x=>slug(x.n)===id)).filter(Boolean);let h=`<button class="close" onclick="closeModal('cmpModal')">&times;</button><h2>⚔️ <span class="pl">Porównanie modeli</span><span class="en">Model comparison</span> (${models.length})</h2>`;h+=`<table class="cmp-t"><thead><tr><th class="cr"><span class="pl">Cecha</span><span class="en">Feature</span></th>`;models.forEach(m=>{h+=`<th>${m.n}</th>`});h+=`</tr></thead><tbody>`;const rows=[['Vendor',m=>`<span class="vdot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${vc(m.v)};margin-right:4px"></span>${m.v}`],['Data',m=>m.d],['Open-source',m=>m.o?'✅':'❌'],['Kategoria',m=>m.c],['Rank',m=>'#'+m.r],['Opis',m=>L(m,'desc_pl','desc_en')],['★ <span class=\'pl\'>Najlepszy w</span><span class=\'en\'>Best at</span>',m=>L(m,'b_pl','b_en')]];rows.forEach(([label,fn])=>{h+=`<tr><td class="cr">${label}</td>`;models.forEach(m=>{h+=`<td>${fn(m)}</td>`});h+=`</tr>`});h+=`</tbody></table>`;h+=`<div style="margin-top:16px;display:flex;gap:8px"><button class="btn" onclick="S.cmp=[];closeModal('cmpModal');render();updateCmpBtn()"><span class="pl">Wyczyść</span><span class="en">Clear</span></button></div>`;document.getElementById('cmpContent').innerHTML=h;document.getElementById('cmpModal').classList.add('show')}

function exportData(fmt){const filtered=M.filter(m=>{const txt=nm(m.n+' '+(m.desc_pl||'')+' '+(m.desc_en||'')+' '+(m.b_pl||'')+' '+(m.b_en||'')+' '+m.c+' '+m.v);let ok=true;if(S.onlyNew)ok=isNew(m.d);if(ok&&S.chip){if(S.chip==='oplus')ok=m.o===1;else if(S.chip==='new')ok=isNew(m.d);else ok=m.c===S.chip}if(ok&&S.q)ok=txt.includes(nm(S.q));return ok});if(fmt==='json'){const data=filtered.map(m=>({name:m.n,vendor:m.v,release_date:m.d,open_source:m.o===1,category:m.c,rank:m.r,description:L(m,'desc_pl','desc_en'),best_at:L(m,'b_pl','b_en'),official_url:m.url,youtube_id:m.yt}));download(JSON.stringify(data,null,2),'ai-models.json','application/json')}else{const headers=['Name','Vendor','Release Date','Open Source','Category','Rank','Description','Best At','Official URL','YouTube URL'];const rows=filtered.map(m=>[m.n,m.v,m.d,m.o?'yes':'no',m.c,m.r,L(m,'desc_pl','desc_en'),L(m,'b_pl','b_en'),m.url,'https://www.youtube.com/watch?v='+m.yt]);const csv=[headers.join(','),...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');download(csv,'ai-models.csv','text/csv')}}
function download(content,filename,mime){const blob=new Blob([content],{type:mime});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);showToast('✓ Pobrano '+filename)}
