<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Models</title>
<style>
:root{--bg:#0a0a0a;--fg:#e5e5e5;--card:#111;--bd:#2a2a2a;--bdl:#1a1a1a;--hp:#fafafa;--hs:#c4c4c4;--hm:#b5b5b5;--hd:#a8a8a8;--ac:#4ade80;--rk:#6b8cce;--ba:#fbbf24;--tbg:#2a2418;--lh:#4ade80;--ov:rgba(0,0,0,.7);--mb:#1a1a1a}
[data-theme="light"]{--bg:#ffffff;--fg:#000000;--card:#f1f5f9;--bd:#94a3b8;--bdl:#cbd5e1;--hp:#000000;--hs:#1e293b;--hm:#1e293b;--hd:#334155;--ac:#15803d;--rk:#1e40af;--ba:#92400e;--tbg:#fef3c7;--lh:#15803d;--ov:rgba(0,0,0,.5);--mb:#94a3b8}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;background:var(--bg);color:var(--fg);margin:0;padding:0;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
.c{max-width:clamp(900px,95vw,1400px);margin:0 auto;padding:20px}
.layout{display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:start}
.sidebar{position:sticky;top:88px}
.main{min-width:0}
@media(max-width:900px){
.layout{grid-template-columns:1fr}
.sidebar{position:static;display:none}
.sidebar.mobile-show{display:block;order:-1}
.main{order:0}
.bc{display:none}
.bottom-info{padding:16px 0;border-top:1px solid var(--bdl);margin-top:20px}
.stats{display:flex;flex-direction:row;flex-wrap:wrap;gap:8px;margin-top:8px}
.st{border-bottom:none;padding:2px 0}
.sidebar.mobile-show .stats{display:flex;flex-direction:row;flex-wrap:wrap;gap:6px;margin-top:8px}
.sidebar.mobile-show .st{border-bottom:none;padding:2px 0}
.banner{font-size:11px;padding:6px 10px;margin-bottom:8px}
.h h1{font-size:16px}
.search{padding:8px 12px;font-size:13px}
.m-toggle{display:flex !important;order:-2;background:var(--card);border:1px solid var(--bd);border-radius:6px;padding:10px 16px;cursor:pointer;font-size:14px;color:var(--hs);font-weight:600;align-items:center;justify-content:center;gap:6px;margin-top:10px;width:100%;-webkit-appearance:none;appearance:none;text-align:center}
.m-toggle.active{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.chips{margin-top:12px}
}
@media(min-width:901px){.m-toggle{display:none !important}.chips{margin-top:10px}}
.h{position:sticky;top:0;background:var(--bg);z-index:100;padding:16px 0;border-bottom:1px solid var(--bd);margin-bottom:20px;transition:background .2s}
.hr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.h h1{font-size:18px;margin:0;font-weight:600;color:var(--hp);letter-spacing:-.02em}
.tgl{background:var(--card);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px;color:var(--fg);transition:border-color .15s}
.tgl:hover{border-color:var(--ac)}
.banner{background:linear-gradient(90deg,var(--tbg),transparent);border-left:3px solid var(--ba);padding:10px 14px;border-radius:4px;margin-bottom:12px;font-size:13px;color:var(--ba);display:none}
.banner.show{display:flex;justify-content:space-between;align-items:center}
.banner button{background:var(--ba);color:var(--bg);border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
.search{width:100%;padding:10px 14px;background:var(--card);border:1px solid var(--bd);border-radius:6px;color:var(--fg);font-size:14px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--ac)}
.search::placeholder{color:var(--hd)}
.chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.chip{padding:4px 10px;background:var(--card);border:1px solid var(--bd);border-radius:12px;color:var(--hs);font-size:11px;cursor:pointer;transition:all .15s;font-weight:500}
.chip:hover{border-color:var(--ac);color:var(--fg)}
.chip.active{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.tools{display:flex;flex-direction:column;gap:6px;margin-top:16px}
.sel{background:var(--card);border:1px solid var(--bd);border-radius:6px;color:var(--fg);font-size:12px;padding:6px 10px;cursor:pointer;outline:none;width:100%}
.btn{background:var(--card);border:1px solid var(--bd);border-radius:6px;color:var(--fg);font-size:12px;padding:6px 12px;cursor:pointer;transition:all .15s;font-weight:500}
.btn:hover{border-color:var(--ac)}
.btn.ac{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.btn.cmp{display:none;position:fixed;bottom:20px;right:20px;z-index:90;padding:10px 20px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.btn.cmp.show{display:block}
.count{font-size:11px;color:var(--hm);font-family:monospace;margin-top:6px}
.stats{display:flex;flex-direction:row;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:11px;color:var(--hm);align-items:center}
.st{display:flex;align-items:center;gap:4px;padding:0;border-bottom:none}
.st .sv{font-size:14px;font-weight:700;color:var(--hp)}
.st .sl{color:var(--hm)}
.st .sbar{width:40px;height:3px;background:var(--bdl);border-radius:2px;overflow:hidden;margin-left:4px}
.st .sbar .sf{height:100%;background:var(--ac);border-radius:2px}
.bc{margin-top:12px;display:grid;grid-template-columns:1fr;gap:3px;font-size:10px}
.bc.hidden{display:none}
.bc .brow{display:flex;align-items:center;gap:6px;font-size:10px;margin-bottom:2px}
.bc .blabel{color:var(--hm);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
.bc .bbg{flex:1;height:6px;background:var(--bdl);border-radius:3px;overflow:hidden}
.bc .bfill{height:100%;background:var(--rk);border-radius:3px;transition:width .3s}
.bc .bval{width:18px;color:var(--hm);font-family:monospace;flex-shrink:0;text-align:right}
.toggle-new{background:var(--card);border:1px solid var(--bd);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:11px;color:var(--hs);font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;width:100%}
.toggle-new:hover{border-color:var(--ac)}
.toggle-new.active{background:var(--ac);color:var(--bg);border-color:var(--ac)}
.toggle-new .dot{width:8px;height:8px;border-radius:50%;background:var(--ba);display:inline-block}
.toggle-new.active .dot{background:var(--bg)}
.k{margin-bottom:24px}
.kt{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--hs);border-bottom:1px solid var(--bdl);padding-bottom:6px;margin-bottom:8px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.kt .kc{color:var(--hd);font-size:10px;font-family:monospace}
.m{display:grid;grid-template-columns:50px 170px 1fr 30px;gap:10px;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--bdl);transition:background .15s;cursor:pointer;position:relative}
.m:hover{background:var(--card);border-radius:4px}
.m.highlight{animation:hl 1s ease-in-out 3}
.m.new-user{border-left:3px solid var(--ac);padding-left:8px}
@keyframes hl{0%,100%{background:transparent}50%{background:rgba(74,222,128,.15)}}
.r{font-family:"SF Mono",Menlo,monospace;color:var(--rk);font-size:12px;font-weight:600}
.r.op::before{content:"⊕";color:var(--ac);margin-right:2px}
.n{font-weight:600;color:var(--hp);font-size:14px}
.n .v{display:block;font-weight:400;color:var(--hm);font-size:11px;margin-top:3px}
.n .vdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.n .vd{display:inline-block;margin-left:6px;color:var(--hd);font-size:10px;font-family:monospace}
.n .tn{display:inline-block;margin-left:6px;padding:1px 6px;background:var(--tbg);color:var(--ba);font-size:9px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;vertical-align:middle}
.n .tn.pulse{animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.4}}
.d{color:var(--hm);font-size:13px}
.b{display:block;color:var(--ba);font-size:12px;margin-top:4px;font-weight:500}
/* Per-card PL/EN toggle (like glossary/pulse) */
.m .d .pl,.m .d .en{display:inline}
.m .b .pl,.m .b .en{display:inline}
.m.en .d .pl,.m.en .b .pl{display:none}
.m.en .d .en,.m.en .b .en{display:inline}
.m:not(.en) .d .en,.m:not(.en) .b .en{display:none}
.card-lang{font-size:10px;font-weight:700;color:#ff6600;background:rgba(255,102,0,.1);padding:2px 8px;border-radius:4px;border:1px solid #ff6600;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-left:auto;text-transform:uppercase;letter-spacing:.05em}
.card-lang[data-lang="pl"]::before{content:"EN"}
.card-lang[data-lang="en"]::before{content:"PL"}
.b::before{content:"★ Najlepszy w: "}
.mc{display:flex;align-items:center;justify-content:center}
.mc input{width:16px;height:16px;cursor:pointer;accent-color:var(--ac)}
.s{margin-top:36px;padding-top:18px;border-top:1px solid var(--bdl)}
.so{font-size:13px;color:#777;margin-bottom:8px;line-height:1.5}.so a{color:#aaa !important;text-decoration:none !important}.so a:visited{color:#aaa !important}.so a:hover{color:#4ade80 !important}.so .dt{font-family:monospace;color:#4ade80 !important;margin-right:4px}.so .sd{font-family:monospace;color:#888 !important;margin-right:6px}.so.tr{background:rgba(251,191,36,.1);border-left:3px solid #fbbf24;padding:4px 8px;border-radius:0 4px 4px 0}.trc{color:#fbbf24;font-size:10px;font-weight:600;margin-left:6px}



.nr{color:var(--hm);font-size:13px;text-align:center;padding:40px 20px;font-style:italic}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--ov);z-index:200;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto}
.modal.show{display:flex}
.md{background:var(--bg);border:1px solid var(--bd);border-radius:10px;max-width:700px;width:100%;padding:24px;margin-bottom:40px;position:relative}
.md h2{font-size:18px;margin:0 0 16px 0;color:var(--hp)}
.md .close{position:absolute;top:12px;right:16px;font-size:24px;cursor:pointer;color:var(--hm);background:none;border:none;line-height:1}
.md .close:hover{color:var(--hp)}
.md .mrow{display:grid;grid-template-columns:120px 1fr;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdl);font-size:13px}
.md .mrow .ml{color:var(--hm);font-weight:600}
.md .mrow .mv{color:var(--fg)}
.md .mlink{display:inline-block;margin-top:12px;padding:8px 16px;background:var(--ac);color:var(--bg);border-radius:6px;text-decoration:none;font-size:13px;font-weight:600}
.md .mlink:hover{opacity:.85}
.cmp-t{width:100%;border-collapse:collapse;font-size:12px}
.cmp-t th,.cmp-t td{padding:8px 10px;border:1px solid var(--bdl);text-align:left;vertical-align:top}
.cmp-t th{background:var(--card);color:var(--hp);font-weight:600}
.cmp-t .cr{color:var(--hm);font-weight:600;width:100px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ac);color:var(--bg);padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.nav-links{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.nav-btn{background:var(--card);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px;color:var(--hs);text-decoration:none;font-weight:500;transition:all .15s;white-space:nowrap}
.nav-btn:hover{border-color:var(--ac);color:var(--fg)}
@media(max-width:540px){.m{grid-template-columns:38px 1fr 30px}.n{font-size:14px}.d{font-size:13px;grid-column:2}.mc{grid-column:3;grid-row:1}.stats{grid-template-columns:repeat(2,1fr)}.hr{flex-direction:column;align-items:flex-start;gap:8px}.h h1{font-size:16px}.nav-btn{font-size:11px;padding:4px 8px}.nav-links{gap:4px;width:100%}}
@media(max-width:380px){.nav-btn{font-size:10px;padding:3px 6px}}
</style></head><body>
<div class="c">
<div class="h">
<div class="hr"><h1>AI Models — aktualny przegląd</h1><div class="nav nav-links">
<a href="ai-models.html" class="nav-btn cur">📊 Models</a>
<a href="ai-benchmarks.html" class="nav-btn">🏆 Benchmarki</a>
<a href="ai-radar.html" class="nav-btn">📡 Radar</a>
<a href="ai-pulse.html" class="nav-btn">💓 Pulse</a>
<a href="ai-glossary.html" class="nav-btn">📖 Słownik</a>
<button class="tgl" id="themeTgl">🌙</button>
<button class="tgl" id="langTgl" title="Przełącz język / Switch language">EN</button>
</div></div>
<div class="banner" id="banner"></div>
<input type="text" class="search" id="search" placeholder="🔍 Szukaj: nazwa, kategoria, opis, use case... (np. 'tekst to speech', 'image', 'coding', 'open source')">
</div>
<div class="layout">
<button class="m-toggle" id="mToggle" onclick="document.getElementById('sidebar').classList.toggle('mobile-show');this.classList.toggle('active')">⚙️ Filtry & Sortowanie</button>
<div class="sidebar" id="sidebar">
<div class="chips" id="chips"></div>
<div class="tools">
<select class="sel" id="sort"><option value="rank" selected>Sortuj: Ranking</option><option value="newest">Sortuj: Najnowsze</option><option value="name">Sortuj: Nazwa A-Z</option><option value="os">Sortuj: Open-source first</option></select>
<button class="toggle-new" id="toggleNew" onclick="toggleOnlyNew()"><span class="dot"></span> Tylko nowe</button>
</div>
</div>

<div class="main">
<div id="content"></div>
</div>
</div>
<div class="bottom-info" id="bottomInfo">
<div class="stats" id="stats"></div>
<div class="bc" id="bc"></div>
<div class="count" id="count"></div>
<div class="export-btns">
<button class="btn" onclick="exportData('json')">📥 JSON</button>
<button class="btn" onclick="exportData('csv')">📥 CSV</button>
</div>
</div>

<div class="s"><div class="kt">Przeanalizowane materiały</div><div id="sources"></div></div>
</div>
<button class="btn cmp" id="cmpBtn" onclick="openCompare()">⚔️ Porównaj (<span id="cmpCount">0</span>)</button>
<div class="modal" id="modelModal" onclick="if(event.target===this)closeModal('modelModal')"><div class="md" id="modelContent"></div></div>
<div class="modal" id="cmpModal" onclick="if(event.target===this)closeModal('cmpModal')"><div class="md" id="cmpContent"></div></div>
<div class="toast" id="toast"></div>
<script src="data/models.js"></script>
<script>
const CAT_LABELS={'LLM':'LLM — duże modele językowe','Image Generation':'Image Generation — lokalne/open-weight','Video Generation':'Video Generation','World Models':'World Models — symulacja świata','Coding':'Coding — asystenci kodu','TTS':'TTS — synteza mowy (text-to-speech)','Multimodal':'Multimodal — any-to-any','AI Science Agents':'AI Science Agents — agenty naukowe','AI Research':'AI Research — autonomne eksperymenty','Humanoid Robots':'Humanoid Robots — roboty humanoidalne','Realtime Avatars':'Realtime Avatars — awatary konwersacyjne','3D Generation':'3D Generation — modelowanie przestrzenne','4D Human':'4D Human Reconstruction','Neural Interface':'Neural Interface — interfejsy mózg-komputer (BCI)','Hardware':'Hardware — urządzenia AI-first','AI Wellness':'AI Wellness / Spa'};
let S={q:'',chip:null,sort:'rank',cmp:[],onlyNew:false,theme:'dark',lang:'pl'};
function L(obj,field_pl,field_en){if(S.lang==='en'&&obj[field_en]&&obj[field_en].trim())return obj[field_en];return obj[field_pl]}
function vc(v){v=v.toLowerCase();if(v.includes('openai'))return'#10a37f';if(v.includes('google')||v.includes('deepmind'))return'#4285f4';if(v.includes('anthropic'))return'#d97757';if(v.includes('meta'))return'#0866ff';if(v.includes('alibaba'))return'#ff6a00';if(v.includes('nvidia'))return'#76b900';if(v.includes('moonshot'))return'#6b8cce';if(v.includes('minimax'))return'#a855f7';if(v.includes('z.ai')||v.includes('zhipu'))return'#4ade80';if(v.includes('deepseek'))return'#4d6bfe';if(v.includes('bytedance'))return'#ff2c55';if(v.includes('eleven'))return'#e0e0e0';if(v.includes('hugging'))return'#ffd21e';if(v.includes('krea'))return'#ff6b6b';if(v.includes('ideogram'))return'#ff006e';if(v.includes('black forest'))return'#888';if(v.includes('futurehouse'))return'#00ff88';if(v.includes('droidup'))return'#ff6600';if(v.includes('beyond'))return'#00d4ff';if(v.includes('merge'))return'#10a37f';if(v.includes('midjourney'))return'#4285f4';return'#888'}
function nm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function isNew(d){const t=new Date(TODAY);const m=new Date(d.length===7?d+'-15':d);if(isNaN(m))return false;const diff=(t-m)/(1000*60*60*24);return diff>=0&&diff<=NEW_DAYS}
function isBan(s){return s.includes('ban-lifted')||s.includes('restricted')}
function daysAgo(d){const t=new Date(TODAY);const m=new Date(d+'-15');if(isNaN(m))return 999;return Math.floor((t-m)/(1000*60*60*24))}
function lastVisit(){const v=localStorage.getItem('lastVisit');if(v)return new Date(v);const t=new Date(TODAY);t.setDate(t.getDate()-14);return t}
function checkNew(m){const lv=lastVisit();const md=new Date(m.d.length===7?m.d+'-15':m.d);return md>lv}
function init(){
S.theme=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
S.lang=localStorage.getItem('lang')||'pl';
document.documentElement.setAttribute('data-theme',S.theme);
document.documentElement.setAttribute('data-lang',S.lang);
document.getElementById('themeTgl').textContent=S.theme==='dark'?'🌙':'☀️';
const langBtn=document.getElementById('langTgl');if(langBtn){langBtn.textContent=S.lang==='pl'?'EN':'PL';langBtn.addEventListener('click',toggleLang)}
const sl=localStorage.getItem('lastVisit');
renderChips();renderStats();renderBanner();render();renderSources();
if(location.hash){setTimeout(()=>highlightModel(location.hash.substring(1)),300)}
window.addEventListener('beforeunload',()=>localStorage.setItem('lastVisit',new Date().toISOString()));
document.getElementById('search').addEventListener('input',e=>{S.q=e.target.value;render()});
document.getElementById('sort').addEventListener('change',e=>{S.sort=e.target.value;render()});
document.getElementById('themeTgl').addEventListener('click',toggleTheme);
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('modelModal');closeModal('cmpModal')}});
}
function renderChips(){const c=document.getElementById('chips');let h='';CATS.forEach(cat=>{h+=`<span class="chip" data-filter="${cat}">${cat}</span>`});h+=`<span class="chip" data-filter="oplus">⊕ Open-source</span>`;c.innerHTML=h;c.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{const f=ch.getAttribute('data-filter');if(S.chip===f){S.chip=null;ch.classList.remove('active')}else{c.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));ch.classList.add('active');S.chip=f}render()}))
function toggleOnlyNew(){S.onlyNew=!S.onlyNew;const btn=document.getElementById('toggleNew');if(S.onlyNew){btn.classList.add('active')}else{btn.classList.remove('active')}render()}}
function renderStats(){const total=M.length;const os=M.filter(m=>m.o).length;const nw=M.filter(m=>isNew(m.d)).length;const cats=CATS.length;const osPct=Math.round(os/total*100);let h=`<div class="st"><span class="sv">${total}</span><span class="sl">modeli</span></div>`;h+=`<div class="st"><span class="sv">${os}</span><span class="sl">OS (${osPct}%)</span></div>`;h+=`<div class="st"><span class="sv">${nw}</span><span class="sl">nowe</span></div>`;h+=`<div class="st"><span class="sv">${cats}</span><span class="sl">kategorii</span></div>`;document.getElementById('stats').innerHTML=h;renderBarChart()}
function renderBarChart(){const bc=document.getElementById('bc');let max=0;CATS.forEach(c=>{const n=M.filter(m=>m.c===c).length;if(n>max)max=n});let h='<div style="font-size:10px;color:var(--hm);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-weight:600">Modele per kategoria</div>';CATS.forEach(c=>{const n=M.filter(m=>m.c===c).length;if(n===0)return;const w=Math.round(n/max*100);h+=`<div class="brow"><span class="blabel">${c}</span><div class="bbg"><div class="bfill" style="width:${w}%"></div></div><span class="bval">${n}</span></div>`});bc.innerHTML=h}
function renderBanner(){const b=document.getElementById('banner');const lv=localStorage.getItem('lastVisit');const nw=M.filter(m=>checkNew(m));if(nw.length>0&&lv){const d=new Date(lv).toLocaleDateString('pl-PL');b.innerHTML=`<span>🆕 ${nw.length} nowych modeli od ${d}</span><button onclick="toggleOnlyNew()">Pokaż tylko nowe</button>`;b.classList.add('show')}else if(nw.length>0&&!lv){b.innerHTML=`<span>🆕 ${nw.length} nowych modeli w ostatnich 14 dniach</span><button onclick="toggleOnlyNew()">Pokaż tylko nowe</button>`;b.classList.add('show')}else{b.classList.remove('show')}}
function render(){const content=document.getElementById('content');let vis=0,total=M.length;let filtered=M.filter(m=>{const txt=nm(m.n+' '+(m.desc_pl||'')+' '+(m.desc_en||'')+' '+(m.b_pl||'')+' '+(m.b_en||'')+' '+m.c+' '+m.v+' '+'#'+m.r);let ok=true;if(S.onlyNew){ok=isNew(m.d)}if(ok&&S.chip){if(S.chip==='oplus'){ok=m.o===1}else if(S.chip==='new'){ok=isNew(m.d)}else{ok=m.c===S.chip}}if(ok&&S.q){ok=txt.includes(nm(S.q))}return ok});filtered.sort((a,b)=>{if(S.sort==='rank'){return a.r-b.r}if(S.sort==='newest'){return new Date(b.d+'-15')-new Date(a.d+'-15')}if(S.sort==='name'){return a.n.localeCompare(b.n)}if(S.sort==='os'){if(a.o!==b.o)return b.o-a.o;return a.r-b.r}return 0});let h='';CATS.forEach(cat=>{const models=filtered.filter(m=>m.c===cat);if(models.length===0)return;models.sort((a,b)=>{if(S.sort==='rank')return a.r-b.r;if(S.sort==='newest')return new Date(b.d+'-15')-new Date(a.d+'-15');if(S.sort==='name')return a.n.localeCompare(b.n);if(S.sort==='os'){if(a.o!==b.o)return b.o-a.o;return a.r-b.r}return 0});h+=`<div class="k" data-cat="${cat}"><div class="kt">${CAT_LABELS[cat]} <span class="kc">(${models.length})</span></div>`;models.forEach(m=>{vis++;const id=slug(m.n);const nw=isNew(m.d);const bl=isBan(m.tags);const u=checkNew(m);const clr=vc(m.v);let tagStr='';if(m.tags.includes('ban-lifted'))tagStr+=` <span class="tn">Ban Lifted</span>`;if(m.tags.includes('restricted'))tagStr+=` <span class="tn">Restricted</span>`;if(nw)tagStr+=` <span class="tn pulse">New</span>`;const cmpChecked=S.cmp.includes(id)?'checked':'';const langHint=S.lang==='pl'?'pl':'en';h+=`<div class="m${u?' new-user':''}${S.lang==='en'?' en':''}" id="model-${id}" onclick="openModel('${id}')"><span class="r${m.o?' op':''}">#${m.r}</span><span class="n">${m.n}${tagStr}<span class="v"><span class="vdot" style="background:${clr}"></span>${m.v}<span class="vd">${m.d}</span></span><span class="card-lang" data-lang="${langHint}" onclick="event.stopPropagation();var c=this.closest('.m');c.classList.toggle('en');this.setAttribute('data-lang',c.classList.contains('en')?'en':'pl')"></span></span><span class="d"><span class="pl">${m.desc_pl||''}</span><span class="en">${m.desc_en||m.desc_pl||''}</span><span class="b"><span class="pl">${m.b_pl||''}</span><span class="en">${m.b_en||m.b_pl||''}</span></span></span><span class="mc"><input type="checkbox" ${cmpChecked} onclick="event.stopPropagation();toggleCompare('${id}')" title="Dodaj do porównania"></span></div>`});h+='</div>'});if(vis===0)h='<div class="nr">Brak wyników dla "'+S.q+'"</div>';content.innerHTML=h;document.getElementById('count').textContent=vis+' z '+total+' modeli';updateCmpBtn()}
function renderSources(){const s=document.getElementById('sources');let h='';SOURCES.forEach(src=>{const cls=src.tr?'so tr':'so';h+='<div class="'+cls+'"><span class="dt">#'+src.n+'</span> <span class="sd">'+src.d+'</span> <a href="https://www.youtube.com/watch?v='+src.id+'">'+src.t+'</a>'+(src.tr?' <span class="trc">✓ transkrypt</span>':'')+'</div>'});s.innerHTML=h}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('themeTgl').textContent=S.theme==='dark'?'🌙':'☀️';localStorage.setItem('theme',S.theme)}

function openModel(id){const m=M.find(x=>slug(x.n)===id);if(!m)return;const clr=vc(m.v);const bl=isBan(m.tags);const nw=isNew(m.d);let h=`<button class="close" onclick="closeModal('modelModal')">&times;</button><h2>${m.n}</h2>`;h+=`<div class="mrow"><span class="ml">Vendor</span><span class="mv"><span class="vdot" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${clr};margin-right:6px"></span>${m.v}</span></div>`;h+=`<div class="mrow"><span class="ml">Data wydania</span><span class="mv">${m.d}</span></div>`;h+=`<div class="mrow"><span class="ml">Kategoria</span><span class="mv">${m.c}</span></div>`;h+=`<div class="mrow"><span class="ml">Rank</span><span class="mv">#${m.r} w kategorii</span></div>`;h+=`<div class="mrow"><span class="ml">Open-source</span><span class="mv">${m.o?'✅ Tak (open-weights/open-source)':'❌ Nie (proprietary)'}</span></div>`;h+=`<div class="mrow"><span class="ml">Opis</span><span class="mv">${L(m,'desc_pl','desc_en')}</span></div>`;h+=`<div class="mrow"><span class="ml">★ Najlepszy w</span><span class="mv">${L(m,'b_pl','b_en')}</span></div>`;if(m.tags.includes('ban-lifted')){h+=`<div class="mrow"><span class="ml">Status</span><span class="mv">⚠️ Ban lifted (27.06.2026) — wraca po 2 tygodniach zawieszenia</span></div>`}if(m.tags.includes('restricted')){h+=`<div class="mrow"><span class="ml">Status</span><span class="mv">⚠️ Dostęp ograniczony — ograniczenia rządowe (government request)</span></div>`}if(nw){h+=`<div class="mrow"><span class="ml">Nowość</span><span class="mv">🆕 Model wydany w ostatnich 14 dniach</span></div>`}h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">`;if(m.url)h+=`<a href="${m.url}" class="mlink">🔗 Oficjalna strona</a>`;h+=`<a href="https://www.youtube.com/watch?v=${m.yt}" class="mlink">📺 Źródło YouTube</a>`;h+=`<button class="btn" onclick="copyLink('${id}')" style="padding:8px 16px">📋 Kopiuj link</button>`;h+=`</div>`;document.getElementById('modelContent').innerHTML=h;do function toggleCompare(id){const i=S.cmp.indexOf(id);if(i>-1){S.cmp.splice(i,1)}else{if(S.cmp.length>=4){showToast('Max 4 modele do porównania');return}S.cmp.push(id)}render();updateCmpBtn()}

function closeModal(id){document.getElementById(id).classList.remove('show')}
function copyLink(id){const url=location.origin+location.pathname+'#model-'+id;navigator.clipboard.writeText(url).then(()=>showToast('✓ Link skopiowany!'))}

function exportData(fmt){const filtered=M.filter(m=>{const txt=nm(m.n+' '+(m.desc_pl||'')+' '+(m.desc_en||'')+' '+(m.b_pl||'')+' '+(m.b_en||'')+' '+m.c+' '+m.v);let ok=true;if(S.onlyNew)ok=isNew(m.d);if(ok&&S.chip){if(S.chip==='oplus')ok=m.o===1;else if(S.chip==='new')ok=isNew(m.d);else ok=m.c===S.chip}if(ok&&S.q)ok=txt.includes(nm(S.q));return ok});if(fmt==='json'){const data=filtered.map(m=>({name:m.n,vendor:m.v,release_date:m.d,open_source:m.o===1,category:m.c,rank:m.r,description:L(m,'desc_pl','desc_en'),best_at:L(m,'b_pl','b_en'),official_url:m.url,youtube_id:m.yt}));download(JSON.stringify(data,null,2),'ai-models.json','application/json')}else{const headers=['Name','Vendor','Release Date','Open Source','Category','Rank','Description','Best At','Official URL','YouTube URL'];const rows=filtered.map(m=>[m.n,m.v,m.d,m.o?'yes':'no',m.c,m.r,L(m,'desc_pl','desc_en'),L(m,'b_pl','b_en'),m.url,'https://www.youtube.com/watch?v='+m.yt]);const csv=[headers.join(','),...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');download(csv,'ai-models.csv','text/csv')}}
function download(content,filename,mime){const blob=new Blob([content],{type:mime});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);showToast('✓ Pobrano '+filename)}
