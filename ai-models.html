function exportData(fmt){const filtered=M.filter(m=>{const txt=nm(m.n+' '+m.desc+' '+m.b+' '+m.c+' '+m.v);let ok=true;if(S.onlyNew)ok=isNew(m.d);if(ok&&S.chip){if(S.chip==='oplus')ok=m.o===1;else if(S.chip==='new')ok=isNew(m.d);else ok=m.c===S.chip}if(ok&&S.q)ok=txt.includes(nm(S.q));return ok});if(fmt==='json'){const data=filtered.map(m=>({name:m.name,vendor:m.v,release_date:m.d,open_source:m.o===1,category:m.c,rank:m.r,description:m.desc,best_at:m.b,official_url:m.url,youtube_id:m.yt}));download(JSON.stringify(data,null,2),'ai-models.json','application/json')}else{const headers=['Name','Vendor','Release Date','Open Source','Category','Rank','Description','Best At','Official URL','YouTube URL'];const rows=filtered.map(m=>[m.n,m.v,m.d,m.o?'yes':'no',m.c,m.r,m.desc,m.b,m.url,'https://www.youtube.com/watch?v='+m.yt]);const csv=[headers.join(','),...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');download(csv,'ai-models.csv','text/csv')}}
function download(content,filename,mime){const blob=new Blob([content],{type:mime});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);showToast('✓ Pobrano '+filename)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
init();
</script></body></html>
