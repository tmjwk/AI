<script>

const TIER_STARS={"3": "★★★", "2": "★", "1": "·"};
let S={q:'',chips:[],tiers:[],theme:'dark',lang:'pl'};
function nm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}

function init(){

function renderChips(){const c=document.getElementById('chips');let h='<span class="chip" data-filter="all"><span class="pl">Wszystkie</span><span class="en">All</span></span>';CATS.forEach(cat=>{const n=B.filter(b=>b.c===cat).length;const catEn=(typeof CATS_EN!=='undefined'&&CATS_EN[cat])?CATS_EN[cat]:cat;h+=`<span class="chip" data-filter="${cat}">${ICONS[cat]} <span class="pl">${cat}</span><span class="en">${catEn}</span> (${n})</span>`});c.innerHTML=h;c.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{const f=ch.getAttribute('data-filter');if(f==='all'){S.chips=[];c.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));ch.classList.add('active')}else{c.querySelector('[data-filter="all"]').classList.remove('active');const i=S.chips.indexOf(f);if(i>-1){S.chips.splice(i,1);ch.classList.remove('active')}else{S.chips.push(f);ch.classList.add('active')}if(S.chips.length===0){c.querySelector('[data-filter="all"]').classList.add('active')}}render()}))}

v>'});content.innerHTML=h}catch(e){console.error("Render error:",e);document.getElementById("content").innerHTML='<div class="nr">⚠ Błąd renderowania — odśwież stronę. Szczegóły w konsoli (F12).</div>'}}
