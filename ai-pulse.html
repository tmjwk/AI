let S={theme:'dark'};
function init(){S.theme=localStorage.getItem('pulse-theme')||'dark';document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('themeTgl').textContent=S.theme==='dark'?'🌙':'☀️';render();document.getElementById('themeTgl').addEventListener('click',toggleTheme)}
