<!DOCTYPE html>
<html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta name="robots" content="noindex"><title>404 — Strona nie znaleziona | AI</title>
<meta name="description" content="Strona nie została znaleziona. Wróć do strony głównej.">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"))</script>
<script>document.documentElement.setAttribute("data-lang",localStorage.getItem("lang")||"pl")</script>
<style>
:root{--bg:#0a0a0a;--fg:#e5e5e5;--card:#111;--bd:#2a2a2a;--bdl:#1a1a1a;--hp:#fafafa;--hs:#c4c4c4;--hm:#b5b5b5;--hd:#a8a8a8;--ac:#4ade80;--rk:#6b8cce;--ba:#fbbf24;--rd:#ef4444;--bl:#3b82f6}
[data-theme="light"]{--bg:#ffffff;--fg:#000000;--card:#f1f5f9;--bd:#94a3b8;--bdl:#cbd5e1;--hp:#000000;--hs:#1e293b;--hm:#1e293b;--hd:#334155;--ac:#15803d;--rk:#1e40af;--ba:#92400e;--rd:#dc2626;--bl:#1d4ed8}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;background:var(--bg);color:var(--fg);margin:0;padding:0;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center}
.c{max-width:600px;width:90%;text-align:center;padding:40px 20px}
.code{font-size:var(--fs-xxl);font-weight:900;color:var(--ac);line-height:1;margin-bottom:20px;letter-spacing:-.05em}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:var(--fs-xl);font-weight:700;color:var(--hp);margin:0 0 12px 0}
p{font-size:var(--fs-m);color:var(--hm);margin:0 0 24px 0}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-block;padding:10px 24px;border-radius:8px;text-decoration:none;font-size:var(--fs-m);font-weight:600;transition:all .15s;cursor:pointer;border:none}
.btn-primary{background:var(--ac);color:#000}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-secondary{background:var(--card);color:var(--hs);border:1px solid var(--bd)}
.btn-secondary:hover{border-color:var(--ac);color:var(--fg)}
[data-lang="pl"] .en{display:none !important}
[data-lang="en"] .pl{display:none !important}
@media(max-width:540px){.code{font-size:var(--fs-xxl)}.links{flex-direction:column}}

/* v8.7.1-14-gd0e458b: Typography scale — 6 rozmiarów (rem, mobile-responsive) */
:root{
--fs-xs:0.625rem;--fs-s:0.75rem;--fs-m:0.875rem;--fs-l:1rem;--fs-xl:1.25rem;--fs-xxl:5rem
}
@media(max-width:540px){
:root{--fs-s:0.6875rem;--fs-m:0.8125rem;--fs-l:0.9375rem;--fs-xl:1.125rem;--fs-xxl:3.75rem}
}

/* Back to top */
.btt{position:fixed;bottom:20px;right:20px;width:40px;height:40px;border-radius:50%;background:var(--ac);color:#000;border:none;cursor:pointer;font-size:20px;display:none;align-items:center;justify-content:center;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:opacity .2s}
.btt:hover{opacity:.85}
.btt.show{display:flex}
/* ====== PRINT STYLES (TODO #13, v8.7.1-14-gd0e458b) — PDF-friendly ====== */
@media print{
  /* Force light theme regardless of user setting */
  :root,[data-theme="dark"]{--bg:#fff;--fg:#000;--card:#fff;--bd:#888;--bdl:#bbb;--hp:#000;--hs:#000;--hm:#222;--hd:#666;--ac:#000;--rk:#000;--ba:#000;--rd:#000;--bl:#000}
  html{font-size:11pt}
  body{background:#fff !important;color:#000 !important;font-family:"Iowan Old Style",Palatino,"Times New Roman",Georgia,serif;line-height:1.5;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* Page margins (A4 / Letter) */
  @page{margin:1.5cm 2cm}
  /* Full width — no clamp */
  .c{max-width:none !important;margin:0 !important;padding:0 !important}
  /* Hide non-printable UI */
  .h,.tgl,.btt,footer,.skeleton-loader,.art-toggle,.art-lang,.art-card-toggle,.nav,.nav-links,.banner,.search-box,.filter-bar,.chips,.card-lang{display:none !important}
  /* Headings */
  h1{font-size:22pt;color:#000 !important;border-bottom:2px solid #000;padding-bottom:4pt;margin-bottom:12pt;page-break-after:avoid}
  h2,h3,h4{color:#000 !important;page-break-after:avoid}
  /* Links — underline + show URL for external only */
  a{color:#000 !important;text-decoration:underline}
  a[href^="http"]:not([href*="tmjwk.github.io"]):after{content:" (" attr(href) ")";font-size:8pt;color:#666;font-family:monospace;word-break:break-all}
  a[href^="#"]:after,a[href^="ai-"]:after,a[href^="index"]:after{content:""}
  /* Print-only header — visible only on paper */
  .print-only-header{display:block !important;border-bottom:1px solid #999;padding-bottom:6pt;margin-bottom:12pt;font-size:9pt;color:#666;text-align:right;font-family:-apple-system,sans-serif}
  /* ===== Weekly articles (index.html) ===== */
  .article{background:#fff !important;border:1px solid #888 !important;border-left:3px solid #000 !important;border-radius:0 !important;padding:14pt 0 !important;margin-bottom:14pt !important;page-break-inside:avoid}
  .article.collapsed .art-body{display:block !important}
  .art-header{cursor:default}
  .art-num{background:#fff !important;border-color:#888 !important;color:#000 !important}
  .art-title{font-size:16pt;color:#000 !important}
  .art-headline{background:#fff !important;border-left:3px solid #444 !important;color:#333 !important;font-style:italic;padding:6pt 10pt}
  .art-meta{color:#666 !important}
  .art-toc{background:#fff !important;border:1px solid #aaa !important;font-size:9pt;page-break-inside:avoid}
  .art-toc-title{color:#000 !important}
  .art-toc-list a{color:#000 !important}
  .art-section{page-break-inside:avoid;margin-bottom:14pt;scroll-margin-top:0}
  .art-section h3{color:#000 !important;border-bottom:1px solid #888 !important;font-size:12pt;page-break-after:avoid}
  .art-section p{color:#000 !important;font-size:10.5pt;orphans:3;widows:3}
  .quote{background:#fff !important;border-left:3px solid #555 !important;color:#222 !important;font-style:italic;page-break-inside:avoid;padding:6pt 10pt;margin:8pt 0}
  .quote .q-author{color:#000 !important}
  .art-sources{color:#666 !important;border-top:1px solid #888 !important;font-size:8.5pt;page-break-inside:avoid}
  /* Lazy-load article cards — force expanded on print */
  .article-card{background:#fff !important;border:1px solid #888 !important;border-radius:0 !important;cursor:default;page-break-inside:avoid;padding:10pt 0 !important}
  .article-card .art-card-body{display:block !important}
  .article-card .art-card-title{color:#000 !important;font-size:13pt}
  /* ===== Cards on other pages ===== */
  .card,.m-card,.g-card,.b-card,.r-card,.bd,.episode,.blk{page-break-inside:avoid;background:#fff !important;border:1px solid #888 !important;border-radius:0 !important}
  /* ===== Tables (LM Arena, layoffs, benchmarks) ===== */
  table{width:100%;border-collapse:collapse;font-size:9pt;page-break-inside:auto}
  thead{display:table-header-group}
  tr{page-break-inside:avoid;page-break-after:auto}
  th,td{border:1px solid #888;padding:4pt 6pt;text-align:left}
  th{background:#eee !important;color:#000 !important;font-weight:600}
  /* ===== Radar episodes ===== */
  .episode{margin-bottom:14pt !important}
  .ep-body{display:block !important}
  .ep-toggle{display:none !important}
  /* ===== Pulse episodes ===== */
  .blk-lbl{font-weight:600;color:#000 !important}
  /* ===== Misc ===== */
  .sec-t{color:#000 !important;border-bottom:2px solid #000 !important;font-size:13pt;page-break-after:avoid}
  .update-list li{color:#000 !important;border-bottom:1px solid #aaa !important}
  .update-date{color:#000 !important}
  /* Print-only block (URL/date) — visible only on paper */
  .print-only{display:block !important}
}
/* Screen: hide print-only elements */
.print-only,.print-only-header{display:none}

</style></head>

<div class="print-only-header">AI Hub · tmjwk.github.io/AI · wydrukowano: <script>document.write(new Date().toLocaleDateString("pl-PL"))</script></div>
<div class="c">
<div class="icon">🤖</div>
<div class="code">404</div>
<h1><span class="pl">Strona nie została znaleziona</span><span class="en">Page not found</span></h1>

<div class="links">
<a href="index.html" class="btn btn-primary"><span class="pl">🏠 Strona główna</span><span class="en">🏠 Home</span></a>
</div>
</div>
<button class="btt" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Do góry / Back to top">↑</button>
<script>window.addEventListener("scroll",function(){var b=document.getElementById("btt");if(b){if(window.scrollY>300){b.classList.add("show")}else{b.classList.remove("show")}}})</script>
